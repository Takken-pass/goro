<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宅建 語呂合わせAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1c1917;
  --paper: #faf7f2;
  --paper2: #f0ebe2;
  --red: #c0392b;
  --red-light: #fdf0ef;
  --gold: #b7893a;
  --gold-light: #fdf6e3;
  --teal: #1a7a6e;
  --teal-light: #e8f5f3;
  --muted: #78716c;
  --border: #d6cfc4;
  --shadow: rgba(28,25,23,0.08);
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 32px 16px 64px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 28px, rgba(0,0,0,0.012) 28px, rgba(0,0,0,0.012) 29px
  );
  pointer-events: none;
  z-index: 0;
}

.wrap {
  width: 100%;
  max-width: 600px;
  position: relative;
  z-index: 1;
}

header {
  text-align: center;
  margin-bottom: 36px;
}

.logo-mark {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--ink);
  color: var(--paper);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  padding: 5px 14px;
  border-radius: 2px;
  margin-bottom: 16px;
}

header h1 {
  font-family: 'Kaisei Decol', serif;
  font-size: clamp(26px, 6vw, 40px);
  font-weight: 700;
  line-height: 1.25;
}

header h1 em {
  font-style: normal;
  color: var(--red);
}

header p {
  margin-top: 10px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.7;
}

.form-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  box-shadow: 0 2px 16px var(--shadow);
  margin-bottom: 24px;
}

.field + .field { margin-top: 20px; }

.field-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 8px;
}

.field input[type="text"] {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  color: var(--ink);
  background: var(--paper);
  outline: none;
  transition: border-color .18s;
}

.field input[type="text"]:focus { border-color: var(--ink); background: #fff; }
.field input[type="text"]::placeholder { color: #b8b0a8; }

.style-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.style-btn {
  cursor: pointer;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--paper2);
  padding: 10px 12px;
  text-align: left;
  transition: all .15s;
  user-select: none;
}

.style-btn:hover { border-color: var(--ink); }
.style-btn.on { border-color: var(--red); background: var(--red-light); }

.style-btn .s-icon { font-size: 18px; display: block; margin-bottom: 4px; }
.style-btn .s-name { font-size: 12px; font-weight: 700; color: var(--ink); display: block; }
.style-btn .s-desc { font-size: 10px; color: var(--muted); display: block; margin-top: 2px; line-height: 1.4; }
.style-btn.on .s-name { color: var(--red); }

.btn-gen {
  width: 100%;
  margin-top: 24px;
  padding: 15px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 8px;
  font-family: 'Kaisei Decol', serif;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background .15s, transform .1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-gen:hover:not(:disabled) { background: #2c2926; transform: translateY(-1px); }
.btn-gen:disabled { opacity: .45; cursor: not-allowed; transform: none; }

.examples-row {
  margin-top: 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.ex-label { font-size: 11px; color: var(--muted); }

.ex-chip {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
}

.ex-chip:hover { border-color: var(--red); color: var(--red); }

/* Result */
#result { display: none; animation: fadeUp .4s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 24px var(--shadow);
}

.rc-band {
  background: var(--ink);
  color: var(--paper);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.rc-band .topic-tag {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  background: rgba(255,255,255,.15);
  padding: 2px 9px;
  border-radius: 3px;
}

.rc-band .style-tag {
  font-size: 11px;
  color: rgba(255,255,255,.6);
  margin-left: auto;
}

.rc-phrase {
  padding: 28px 24px 20px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.rc-phrase .phrase-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--red);
  margin-bottom: 12px;
}

.rc-phrase .phrase-main {
  font-family: 'Kaisei Decol', serif;
  font-size: clamp(22px, 5vw, 32px);
  font-weight: 700;
  line-height: 1.4;
  color: var(--ink);
}

.rc-phrase .phrase-rhythm {
  margin-top: 8px;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 1px;
}

.rc-section {
  padding: 18px 24px;
  border-bottom: 1px solid var(--paper2);
}

.rc-section:last-of-type { border-bottom: none; }

.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2.5px;
  margin-bottom: 10px;
}

.story-text {
  font-size: 14px;
  line-height: 1.85;
  color: #3a3330;
  background: var(--paper2);
  border-radius: 8px;
  padding: 14px 16px;
  border-left: 3px solid var(--gold);
}

.map-list { display: flex; flex-direction: column; }

.map-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px dashed var(--paper2);
  font-size: 14px;
}

.map-row:last-child { border-bottom: none; }

.map-key {
  background: var(--gold-light);
  border: 1px solid #e8d5a3;
  border-radius: 5px;
  padding: 2px 9px;
  font-size: 13px;
  font-weight: 700;
  color: var(--gold);
  white-space: nowrap;
  flex-shrink: 0;
}

.map-val { color: var(--ink); line-height: 1.6; }

.tip-box {
  background: var(--teal-light);
  border: 1px solid #b2d8d3;
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--teal);
}

.rc-actions {
  padding: 14px 20px;
  background: var(--paper2);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  border-top: 1px solid var(--border);
}

.act-btn {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 7px 14px;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: #fff;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
}

.act-btn:hover { border-color: var(--ink); color: var(--ink); }
.act-btn.primary { background: var(--red); border-color: var(--red); color: #fff; }
.act-btn.primary:hover { background: #a93226; }

/* Loading */
#loading { display: none; text-align: center; padding: 36px 0; }

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 14px;
}

@keyframes spin { to { transform: rotate(360deg); } }

#loading p {
  font-size: 13px;
  color: var(--muted);
  animation: blink 1.4s ease infinite;
}

@keyframes blink { 0%,100%{opacity:.4} 50%{opacity:1} }

.error-box {
  background: #fdf0ef;
  border: 1px solid #f5c6c3;
  border-radius: 8px;
  padding: 14px 16px;
  font-size: 13px;
  color: var(--red);
  line-height: 1.7;
}

/* Saved */
.saved-wrap {
  margin-top: 32px;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}

.saved-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.saved-header h3 {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--muted);
}

.saved-clear {
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  background: none;
  border: none;
  font-family: inherit;
  text-decoration: underline;
}

.saved-list { display: flex; flex-direction: column; gap: 6px; }

.saved-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  transition: border-color .15s;
}

.saved-item:hover { border-color: var(--ink); }

.saved-phrase {
  font-family: 'Kaisei Decol', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--red);
  flex: 1;
}

.saved-topic {
  font-size: 11px;
  color: var(--muted);
}

.saved-empty {
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  padding: 12px 0;
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-mark">🏠 宅建AI</div>
    <h1>語呂合わせ<br><em>ジェネレーター</em></h1>
    <p>条文・数字・ルールを入力するだけで<br>記憶に焼き付くオリジナル語呂合わせを生成</p>
  </header>

  <div class="form-card">

    <div class="field">
      <label class="field-label">📝 覚えたいキーワード・数字・条文</label>
      <input type="text" id="keyword" placeholder="例：クーリングオフ 8日間 申込場所以外" maxlength="120">
    </div>

    <div class="field">
      <label class="field-label">🎨 スタイル（複数選択可）</label>
      <div class="style-grid">
        <div class="style-btn on" data-v="story">
          <span class="s-icon">🎭</span>
          <span class="s-name">ストーリー</span>
          <span class="s-desc">登場人物が動く<br>ドラマ仕立て</span>
        </div>
        <div class="style-btn on" data-v="dajare">
          <span class="s-icon">🎯</span>
          <span class="s-name">ダジャレ・音遊び</span>
          <span class="s-desc">数字・音の<br>クスっと読み換え</span>
        </div>
        <div class="style-btn on" data-v="henteko">
          <span class="s-icon">🦄</span>
          <span class="s-name">ヘンテコ・シュール</span>
          <span class="s-desc">宇宙人・食べ物…<br>意外な組み合わせ</span>
        </div>
        <div class="style-btn on" data-v="song">
          <span class="s-icon">🎵</span>
          <span class="s-name">歌・リズム</span>
          <span class="s-desc">口ずさめる<br>リズム語呂</span>
        </div>
      </div>
    </div>

    <button class="btn-gen" id="genBtn" onclick="generate()">
      ⚡ 語呂合わせを生成する
    </button>

    <div class="examples-row">
      <span class="ex-label">例：</span>
      <span class="ex-chip" onclick="setEx('クーリングオフ 8日間 申込場所以外')">クーリングオフ</span>
      <span class="ex-chip" onclick="setEx('37条書面 必要的記載事項')">37条書面</span>
      <span class="ex-chip" onclick="setEx('建蔽率・容積率の数値')">建蔽率・容積率</span>
      <span class="ex-chip" onclick="setEx('不動産取得税 免税点 土地・家屋')">不動産取得税</span>
      <span class="ex-chip" onclick="setEx('根保証 個人保証 極度額 書面')">根保証</span>
      <span class="ex-chip" onclick="setEx('重要事項説明 35条 書面 交付')">重要事項説明</span>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loadingMsg">語呂合わせを考え中…</p>
  </div>

  <div id="result"></div>

  <div class="saved-wrap">
    <div class="saved-header">
      <h3>⭐ 保存済み</h3>
      <button class="saved-clear" onclick="clearSaved()">すべて削除</button>
    </div>
    <div class="saved-list" id="savedList"></div>
  </div>

</div>
<script>
let selectedStyles = new Set(['story','dajare','henteko','song']);
let savedItems = [];
try { savedItems = JSON.parse(localStorage.getItem('tgoro_v2') || '[]'); } catch{}

document.querySelectorAll('.style-btn').forEach(b => {
  b.addEventListener('click', () => {
    b.classList.toggle('on');
    if (b.classList.contains('on')) selectedStyles.add(b.dataset.v);
    else selectedStyles.delete(b.dataset.v);
  });
});

function setEx(kw) {
  document.getElementById('keyword').value = kw;
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const loadingTexts = ['語呂合わせを考え中…','記憶に残るフレーズを探索中…','試験対策AIが全力思考中…','ユニークな語呂合わせを生成中…'];
let loadingTimer;

function showLoading() {
  let i = 0;
  document.getElementById('loadingMsg').textContent = loadingTexts[0];
  loadingTimer = setInterval(() => { i=(i+1)%loadingTexts.length; document.getElementById('loadingMsg').textContent = loadingTexts[i]; }, 1800);
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';
}

function hideLoading() {
  clearInterval(loadingTimer);
  document.getElementById('loading').style.display = 'none';
}

const SYSTEM = `あなたは宅建試験の語呂合わせ専門AIです。
ユーザーが送るキーワードとスタイル候補に基づき、記憶に強烈に刻み込まれる語呂合わせを生成してください。

# 出力形式
必ずJSONのみ返してください。マークダウンコードブロック・前置き・説明は一切不要です。

{
  "topic": "トピック名（12文字以内）",
  "phrase": "語呂合わせ本体フレーズ（30文字以内）",
  "rhythm": "読み方リズム（カタカナまたはひらがなで区切り文字はスラッシュ）",
  "story": "記憶定着用ストーリー（100から160文字）",
  "mapping": [
    { "key": "語呂の部分フレーズ", "value": "対応する法律的意味" }
  ],
  "exam_tip": "試験頻出ひっかけと注意点（50から90文字）",
  "style_used": "story または dajare または henteko または song"
}

# JSON生成時の絶対ルール
- すべての文字列値にダブルクォーテーション記号を含めない
- 改行コードを文字列値に含めない（改行は読点や句点で代替）
- バックスラッシュを文字列値に含めない
- 括弧や記号は全角を使用する
- JSONとして完全に有効な形式のみ出力する

# スタイル別ルール（selectedStylesの中からランダムに1つ選んで使う）

story（ストーリー仕立て）:
- 登場人物（名前付き）が登場する具体的なドラマ
- 感情・驚き・笑いが入ると記憶に残りやすい
- 数字は擬人化または日常行動に置き換える

dajare（ダジャレ・音遊び）:
- 数字の読み方を大胆に変換（8はハチやヤやオッパチ）
- 同音異義・近似音で法律用語を日常語に置換
- クスっと笑えるシュールさ

henteko（ヘンテコ・シュール）:
- 宇宙人・巨大な食べ物・動物の会議・異世界設定など
- なぜここに？という違和感が記憶フック
- 法律的に正確な内容を突拍子もないシーンで表現

song（歌・リズム）:
- 5・7・5や7・7・5・7・5など日本語リズムに乗せる
- phraseは声に出して心地よいリズム感を最優先
- 繰り返し・韻踏みを活用

# 法律上の絶対ルール
- mapping は重要数字・条件・例外を3から5個網羅すること
- 法律内容は100パーセント正確。面白さのために事実を曲げない
- 宅建本試験で実際に問われる論点のみ扱う
- 毎回ランダム性を持たせ、同じキーワードでも異なる語呂合わせを生成する`;

async function generate() {
  const kw = document.getElementById('keyword').value.trim();
  if (!kw) { alert('キーワードを入力してください'); return; }
  if (selectedStyles.size === 0) { alert('スタイルを1つ以上選んでください'); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  showLoading();

  const userMsg = `スタイル候補: ${[...selectedStyles].join('/')}
キーワード: ${kw}
ランダムシード: ${Math.random().toString(36).slice(2,7)}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: [{ role: 'user', content: userMsg }]
      })
    });

    const data = await res.json();
    const raw = (data.content||[]).map(c=>c.text||'').join('').trim();
    
    // Strip markdown code fences if present
    let cleaned = raw.replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();
    
    // Parse with better error recovery
    let r;
    try {
      r = JSON.parse(cleaned);
    } catch(parseErr) {
      // Try to extract JSON object with regex as fallback
      const match = cleaned.match(/\{[\s\S]*\}/);
      if (match) {
        r = JSON.parse(match[0]);
      } else {
        throw new Error('JSONの解析に失敗しました。もう一度お試しください。');
      }
    }

    hideLoading();
    renderResult(r, kw);

  } catch(e) {
    hideLoading();
    const el = document.getElementById('result');
    el.innerHTML = `<div class="error-box">⚠️ エラーが発生しました：${esc(e.message)}<br>もう一度試してください。</div>`;
    el.style.display = 'block';
  }

  btn.disabled = false;
}

function renderResult(r, kw) {
  const styleNames = { story:'🎭 ストーリー', dajare:'🎯 ダジャレ', henteko:'🦄 ヘンテコ', song:'🎵 リズム歌' };
  const styleLabel = styleNames[r.style_used] || r.style_used || '';

  const mappingHtml = (r.mapping||[]).map(m =>
    `<div class="map-row"><span class="map-key">${esc(m.key)}</span><span class="map-val">${esc(m.value)}</span></div>`
  ).join('');

  const savedEnc = encodeURIComponent(JSON.stringify({...r, _kw: kw}));

  const html = `
  <div class="result-card">
    <div class="rc-band">
      <span class="topic-tag">${esc(r.topic||'')}</span>
      <span style="font-size:13px;font-weight:700;color:rgba(255,255,255,.9)">${esc(kw)}</span>
      <span class="style-tag">${esc(styleLabel)}</span>
    </div>
    <div class="rc-phrase">
      <div class="phrase-label">💡 語呂合わせ</div>
      <div class="phrase-main">${esc(r.phrase||'')}</div>
      ${r.rhythm ? `<div class="phrase-rhythm">${esc(r.rhythm)}</div>` : ''}
    </div>
    <div class="rc-section">
      <div class="section-label" style="color:var(--gold)">📖 ストーリー</div>
      <div class="story-text">${esc(r.story||'')}</div>
    </div>
    <div class="rc-section">
      <div class="section-label" style="color:var(--ink)">🔗 対応関係</div>
      <div class="map-list">${mappingHtml}</div>
    </div>
    <div class="rc-section">
      <div class="section-label" style="color:var(--teal)">⚠️ 試験ポイント</div>
      <div class="tip-box">${esc(r.exam_tip||'')}</div>
    </div>
    <div class="rc-actions">
      <button class="act-btn primary" onclick="saveResult('${savedEnc}')">⭐ 保存</button>
      <button class="act-btn" onclick="generate()">🔄 別バージョン</button>
      <button class="act-btn" onclick="copyPhrase('${encodeURIComponent(r.phrase||'')}', this)">📋 コピー</button>
    </div>
  </div>`;

  const el = document.getElementById('result');
  el.innerHTML = html;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyPhrase(enc, btn) {
  navigator.clipboard.writeText(decodeURIComponent(enc)).then(() => {
    btn.textContent = '✅ コピー済み';
    setTimeout(() => btn.textContent = '📋 コピー', 1500);
  });
}

function saveResult(enc) {
  const r = JSON.parse(decodeURIComponent(enc));
  savedItems.unshift(r);
  if (savedItems.length > 30) savedItems.length = 30;
  try { localStorage.setItem('tgoro_v2', JSON.stringify(savedItems)); } catch{}
  renderSaved();
  const btn = event.target;
  btn.textContent = '✅ 保存済み';
  setTimeout(() => btn.textContent = '⭐ 保存', 1500);
}

function clearSaved() {
  if (!savedItems.length) return;
  if (!confirm('保存した語呂合わせをすべて削除しますか？')) return;
  savedItems = [];
  try { localStorage.removeItem('tgoro_v2'); } catch{}
  renderSaved();
}

function renderSaved() {
  const el = document.getElementById('savedList');
  if (!savedItems.length) { el.innerHTML = '<div class="saved-empty">まだ保存がありません</div>'; return; }
  el.innerHTML = savedItems.map((item, i) => `
    <div class="saved-item" onclick="renderResult(savedItems[${i}], savedItems[${i}]._kw || savedItems[${i}].topic || '')">
      <span class="saved-phrase">${esc(item.phrase||'')}</span>
      <span class="saved-topic">${esc(item.topic||'')}</span>
    </div>`).join('');
}

document.getElementById('keyword').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });

renderSaved();
</script>
</body>
</html>
